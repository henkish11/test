<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Henkish · Space</title>

<style>
@import url("https://fonts.googleapis.com/css?family=Lora:400,400i,700");

body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    justify-content: center;
    align-items: center;
    background-color: #101010;
    background-image: linear-gradient(rgba(16, 16, 16, 0.8), rgba(16, 16, 16, 0.8)), url('https://xatimg.com/image/AeKGBMT8u33T.jpg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    margin: 0;
    color: white;
    overflow-x: hidden;
}

/* شاشة القفل */
#lockScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
}

#lockScreen input {
    padding: 12px;
    font-size: 18px;
    text-align: center;
    border: none;
    outline: none;
    border-radius: 8px;
}

#lockScreen button {
    margin-top: 10px;
    padding: 10px 20px;
    background: #ffffff;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

h1, p {
    text-align: center;
    line-height: 1.8;
    font-family: Lora, serif;
    margin: 10px 0;
}

.glowIn {
    color: white;
    white-space: pre-wrap;
}

.glowIn span {
    display: inline-block;
    opacity: 0;
    animation: glow-in 0.8s both;
}

@keyframes glow-in {
    from { opacity: 0; }
    65% { opacity: 1; text-shadow: 0 0 25px white; }
    75% { opacity: 1; }
    to { opacity: 0.7; }
}

.videos {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 30px;
    max-width: 1000px;
    padding: 20px;
}

.videos iframe {
    width: 200px;
    height: 135px;
    border: none;
    border-radius: 8px;
    transition: 0.3s;
}

.videos iframe:hover {
    transform: scale(1.1);
    box-shadow: 0 0 15px rgba(255,255,255,0.3);
}
</style>
</head>

<body>

<!-- 🔐 شاشة القفل -->
<div id="lockScreen">
    <h2>🔐 Enter Password</h2>
    <input type="password" id="password" placeholder="Password">
    <button onclick="checkPass()">Enter</button>
    <p id="error" style="color:red;"></p>
</div>

<!-- 💎 المحتوى -->
<div id="content" style="display:none;">

<h1 class="glowIn">Hello,ժօLLվ ,</h1>
<p class="glowIn">I'm xats trader and I love trading very much and selling and buying ID's</p>
<p class="glowIn">iEgypt (106080) ❤️ DodoLove14 (1541187216)</p>
<p class="glowIn">нєηкιѕн ❤️ ժօLLվ</p>

<div class="videos">
    <iframe src="https://www.youtube.com/embed/4ulSR860HyU"></iframe>
    <iframe src="https://www.youtube.com/embed/b-KFYv7cuxk"></iframe>
    <iframe src="https://www.youtube.com/embed/OoyK4I3DyJ0"></iframe>
</div>

</div>

<script>
"use strict";

// 🔐 كلمة السر
function checkPass() {
    let pass = document.getElementById("password").value;

    if(pass === "111991") {
        document.getElementById("lockScreen").style.display = "none";
        document.getElementById("content").style.display = "block";

        // تشغيل الانيميشن بعد الفتح
        startGlow();
    } else {
        document.getElementById("error").innerText = "❌ Wrong Password";
    }
}

// ✨ تشغيل تأثير النص بعد الفتح
function startGlow() {
    let glowInTexts = document.querySelectorAll(".glowIn");

    glowInTexts.forEach(glowInText => {
        let letters = glowInText.textContent.split("");
        glowInText.textContent = "";

        letters.forEach((letter, i) => {
            let span = document.createElement("span");
            span.textContent = letter;
            span.style.animationDelay = `${i * 0.05}s`;
            glowInText.append(span);
        });
    });
}
</script>

</body>
</html>
