<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAMY | CYBERPUNK VIP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap');

body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    overflow: hidden;
    color: #00ffe5;
    background: black;
}

/* MATRIX BACKGROUND */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -2;
}

/* LOGIN SCREEN */
#login {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(0,255,229,0.08), black 70%);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
}

#login input {
    padding: 12px;
    border: 1px solid #00ffe5;
    background: transparent;
    color: #00ffe5;
    text-align: center;
    font-size: 18px;
    margin: 10px;
    outline: none;
}

#login button {
    padding: 10px 25px;
    background: #00ffe5;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

/* PROFILE */
#profile {
    display: none;
    text-align: center;
    padding-top: 40px;
}

.glow {
    text-shadow: 0 0 10px #00ffe5, 0 0 25px #00ffe5;
}

.box {
    margin: 20px auto;
    padding: 20px;
    width: 320px;
    border: 1px solid rgba(0,255,229,0.4);
    background: rgba(0,0,0,0.6);
    border-radius: 10px;
}

.song {
    margin: 15px auto;
    padding: 15px;
    width: 320px;
    border: 1px solid rgba(0,255,229,0.3);
    background: rgba(0,0,0,0.5);
    border-radius: 10px;
}

audio {
    width: 100%;
    margin-top: 10px;
}

button {
    padding: 8px 15px;
    margin-top: 8px;
    background: transparent;
    border: 1px solid #00ffe5;
    color: #00ffe5;
    cursor: pointer;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- LOGIN -->
<div id="login">
    <h2 class="glow">ENTER ACCESS CODE</h2>
    <input type="password" id="pass" placeholder="PASSWORD">
    <button onclick="checkPass()">UNLOCK</button>
</div>

<!-- PROFILE -->
<div id="profile">

    <h1 class="glow">RAMY</h1>

    <div class="box">
        <p>👤 Name: Ramy</p>
        <p>🎂 Age: 35</p>
        <p>🟢 Status: ONLINE</p>
        <p>💠 Mode: CYBERPUNK VIP</p>
    </div>

    <!-- SONG 1 -->
    <div class="song">
        <p>🎵 الحب الأبدي</p>
        <audio controls>
            <source src="love_eternal.mp3" type="audio/mpeg">
        </audio>
    </div>

    <!-- SONG 2 -->
    <div class="song">
        <p>🎵 أصالة - شايفه فيك</p>
        <audio controls>
            <source src="assala_shayfa_fek.mp3" type="audio/mpeg">
        </audio>
    </div>

    <!-- SONG 3 -->
    <div class="song">
        <p>🎵 قلبي محارب - أمين خطاب</p>
        <audio controls>
            <source src="amin_khattab_qalbi_mohareb.mp3" type="audio/mpeg">
        </audio>
    </div>

</div>

<script>

/* PASSWORD */
function checkPass(){
    let p = document.getElementById("pass").value;
    if(p === "111991"){
        document.getElementById("login").style.display = "none";
        document.getElementById("profile").style.display = "block";
    } else {
        alert("ACCESS DENIED");
    }
}

/* MATRIX EFFECT */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "RAMYCYBERVIP010101";
letters = letters.split("");

let fontSize = 14;
let columns = canvas.width / fontSize;

let drops = Array(Math.floor(columns)).fill(1);

function draw(){
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#00ffe5";
    ctx.font = fontSize + "px monospace";

    for(let i=0;i<drops.length;i++){
        let text = letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text,i*fontSize,drops[i]*fontSize);

        if(drops[i]*fontSize > canvas.height && Math.random()>0.975){
            drops[i]=0;
        }
        drops[i]++;
    }
}

setInterval(draw,33);
</script>

</body>
</html>
