<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REALITY WORLD - ROOMS</title>

<style>
body{
margin:0;
background:black;
color:#00ffe5;
font-family:Arial;
}

#topbar{
padding:10px;
border-bottom:1px solid cyan;
display:flex;
gap:10px;
}

button{
background:black;
color:cyan;
border:1px solid cyan;
padding:10px;
cursor:pointer;
}

#chat{
height:300px;
overflow:auto;
border:1px solid cyan;
margin:10px;
padding:10px;
}

input{
width:75%;
padding:10px;
background:black;
color:cyan;
border:1px solid cyan;
}
</style>
</head>

<body>

<div id="topbar">
<button onclick="switchRoom('main')">🟢 MAIN CORE</button>
<button onclick="switchRoom('lab')">🔵 CYBER LAB</button>
<button onclick="switchRoom('dark')">🔴 DARK CHAT</button>
</div>

<h3 id="roomTitle">ROOM: MAIN CORE</h3>

<div id="chat"></div>

<input id="msg">
<button onclick="send()">SEND</button>

<script>

let currentRoom = "main";

// تخزين لكل غرفة
let rooms = {
main: [],
lab: [],
dark: []
};

// تغيير الغرفة
function switchRoom(room){
currentRoom = room;

document.getElementById("roomTitle").innerText =
"ROOM: " + room.toUpperCase();

render();
}

// عرض الرسائل
function render(){
let chat = document.getElementById("chat");
chat.innerHTML = "";

rooms[currentRoom].forEach(m=>{
chat.innerHTML += m + "<br>";
});
}

// AI بسيط لكل غرفة
function aiResponse(msg){
msg = msg.toLowerCase();

if(msg.includes("ramy"))
return "👑 RAMY is present in this reality";

if(currentRoom === "dark")
return "☠ DARK AI ACTIVE NODE RESPONSE";

if(currentRoom === "lab")
return "🧪 LAB RESULT GENERATED";

return "AI: message processed";
}

// إرسال رسالة
function send(){
let msg = document.getElementById("msg").value;

rooms[currentRoom].push("YOU: " + msg);

let reply = aiResponse(msg);

rooms[currentRoom].push(reply);

document.getElementById("msg").value = "";

render();
}

</script>

</body>
</html>
