<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAMY | CYBERPUNK PROFILE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap');

body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    overflow: hidden;
    color: #00ffe5;
}

/* MATRIX BACKGROUND */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
    background: black;
}

/* LOGIN SCREEN */
#login {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
}

#login input {
    padding: 12px;
    border: 1px solid #00ffe5;
    background: transparent;
    color: #00ffe5;
    text-align: center;
    margin: 10px;
    font-size: 18px;
}

#login button {
    padding: 10px 25px;
    background: #00ffe5;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

/* PROFILE */
#profile {
    display: none;
    text-align: center;
    padding-top: 80px;
}

.glow {
    text-shadow: 0 0 10px #00ffe5, 0 0 20px #00ffe5;
}

.box {
    margin-top: 20px;
    padding: 20px;
    border: 1px solid rgba(0,255,229,0.4);
    display: inline-block;
    background: rgba(0,0,0,0.5);
}

button.music {
    margin-top: 20px;
    padding: 10px 20px;
    background: transparent;
    border: 1px solid #00ffe5;
    color: #00ffe5;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- MATRIX BACKGROUND -->
<canvas id="matrix"></canvas>

<!-- LOGIN -->
<div id="login">
    <h2 class="glow">ENTER ACCESS CODE</h2>
    <input type="password" id="pass" placeholder="PASSWORD">
    <button onclick="checkPass()">UNLOCK</button>
</div>

<!-- PROFILE -->
<div id="profile">
    <h1 class="glow">RAMY</h1>

    <div class="box">
        <p>Age: 35</p>
        <p>Status: 🟢 ONLINE</p>
        <p>System: CYBERPUNK VIP PROFILE</p>
    </div>

    <br>

    <button class="music" onclick="playMusic()">▶ PLAY MUSIC</button>

    <div style="margin-top:20px;">
        <iframe id="song" width="0" height="0"
        src="https://www.youtube.com/embed/4ulSR860HyU?enablejsapi=1"
        allow="autoplay"></iframe>
    </div>
</div>

<script>
// PASSWORD
function checkPass(){
    let p = document.getElementById("pass").value;
    if(p === "111991"){
        document.getElementById("login").style.display = "none";
        document.getElementById("profile").style.display = "block";
    } else {
        alert("ACCESS DENIED");
    }
}

// MUSIC
function playMusic(){
    let iframe = document.getElementById("song");
    iframe.src += "&autoplay=1";
}

/* MATRIX */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01RAMYCYBERPUNK010101";
letters = letters.split("");

let fontSize = 14;
let columns = canvas.width / fontSize;

let drops = [];

for(let x = 0; x < columns; x++)
    drops[x] = 1;

function draw(){
    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ffe5";
    ctx.font = fontSize + "px monospace";

    for(let i = 0; i < drops.length; i++){
        let text = letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text, i*fontSize, drops[i]*fontSize);

        if(drops[i]*fontSize > canvas.height && Math.random() > 0.975)
            drops[i] = 0;

        drops[i]++;
    }
}

setInterval(draw, 33);
</script>

</body>
</html>
