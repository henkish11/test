<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAMY | CYBERPUNK PROFILE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap');

body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    overflow: hidden;
    color: #00ffe5;
    background: black;
}

/* MATRIX */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -2;
}

/* LOGIN */
#login {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(0,255,229,0.08), black 70%);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
}

#login input {
    padding: 12px;
    border: 1px solid #00ffe5;
    background: transparent;
    color: #00ffe5;
    text-align: center;
    font-size: 18px;
    margin: 10px;
    outline: none;
}

#login button {
    padding: 10px 25px;
    background: #00ffe5;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

/* PROFILE */
#profile {
    display: none;
    text-align: center;
    padding-top: 40px;
}

.glow {
    text-shadow: 0 0 10px #00ffe5, 0 0 25px #00ffe5;
}

.box {
    margin: 20px auto;
    padding: 20px;
    width: 340px;
    border: 1px solid rgba(0,255,229,0.4);
    background: rgba(0,0,0,0.6);
    border-radius: 10px;
}

/* VIDEOS STYLE (MUSIC) */
.videos {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 25px;
}

.videos iframe {
    width: 220px;
    height: 140px;
    border: none;
    border-radius: 10px;
    transition: 0.3s;
}

.videos iframe:hover {
    transform: scale(1.1);
    box-shadow: 0 0 15px #00ffe5;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- LOGIN -->
<div id="login">
    <h2 class="glow">ENTER ACCESS CODE</h2>
    <input type="password" id="pass" placeholder="PASSWORD">
    <button onclick="checkPass()">UNLOCK</button>
</div>

<!-- PROFILE -->
<div id="profile">

    <h1 class="glow">RAMY</h1>

    <div class="box">
        <p>👤 Name: Ramy</p>
        <p>🎂 Age: 35</p>
        <p>🟢 Status: ONLINE</p>
        <p>💠 Mode: CYBERPUNK VIP</p>
    </div>

    <!-- MUSIC (ORIGINAL STYLE LIKE FIRST TIME) -->
    <div class="videos">

        <iframe src="https://www.youtube.com/embed/4ulSR860HyU" allow="autoplay"></iframe>

        <iframe src="https://www.youtube.com/embed/b-KFYv7cuxk" allow="autoplay"></iframe>

        <iframe src="https://www.youtube.com/embed/OoyK4I3DyJ0" allow="autoplay"></iframe>

    </div>

</div>

<script>

/* PASSWORD */
function checkPass(){
    let p = document.getElementById("pass").value;
    if(p === "111991"){
        document.getElementById("login").style.display = "none";
        document.getElementById("profile").style.display = "block";
    } else {
        alert("ACCESS DENIED");
    }
}

/* MATRIX */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "RAMYCYBERLOVE010101";
letters = letters.split("");

let fontSize = 14;
let columns = canvas.width / fontSize;

let drops = Array(Math.floor(columns)).fill(1);

function draw(){
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#00ffe5";
    ctx.font = fontSize + "px monospace";

    for(let i=0;i<drops.length;i++){
        let text = letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text,i*fontSize,drops[i]*fontSize);

        if(drops[i]*fontSize > canvas.height && Math.random()>0.975){
            drops[i]=0;
        }
        drops[i]++;
    }
}

setInterval(draw,33);
</script>

</body>
</html>
