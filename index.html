<!DOCTYPE html>
<html>
<head>
<title>REALITY WORLD - RAMY</title>

<style>
body{
margin:0;
background:black;
color:#00ffe5;
font-family:Arial;
}

#chat{
height:300px;
overflow:auto;
border:1px solid cyan;
padding:10px;
margin:20px;
}

input{
width:80%;
padding:10px;
background:black;
color:cyan;
border:1px solid cyan;
}

button{
padding:10px;
background:cyan;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<h2>🌐 REALITY WORLD - RAMY</h2>

<div id="chat"></div>

<input id="msg" placeholder="type message...">
<button onclick="send()">SEND</button>

<script>
async function send(){
let msg=document.getElementById("msg").value;

let res=await fetch("http://localhost:3000/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:msg})
});

let data=await res.json();

document.getElementById("chat").innerHTML +=
"You: "+msg+"<br>AI: "+data.reply+"<br><br>";

document.getElementById("msg").value="";
}
</script>

</body>
</html>
