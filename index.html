<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>METAVERSE ASCENSION - RAMY</title>

<style>
body{
margin:0;
background:black;
color:#00ffe5;
font-family:Arial;
overflow:hidden;
}

#login{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

.box{
padding:30px;
border:1px solid cyan;
box-shadow:0 0 40px cyan;
text-align:center;
}

input{
padding:10px;
background:black;
border:1px solid cyan;
color:cyan;
}

button{
background:black;
color:cyan;
border:1px solid cyan;
padding:10px;
cursor:pointer;
margin:5px;
}

/* MAIN */
#main{
display:none;
height:100vh;
}

#top{
padding:10px;
border-bottom:1px solid cyan;
text-align:center;
}

#content{
display:flex;
height:calc(100vh - 60px);
}

/* LEFT ROOMS */
#rooms{
width:200px;
border-right:1px solid cyan;
padding:10px;
}

#chatBox{
flex:1;
padding:10px;
}

.roomBtn{
width:100%;
margin:5px 0;
}

/* CHAT */
#chat{
height:70%;
overflow:auto;
border:1px solid cyan;
padding:10px;
}

input.msg{
width:80%;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="box">
<h2>🌐 METAVERSE ACCESS</h2>
<input type="password" id="pass">
<br><br>
<button onclick="unlock()">ENTER</button>
</div>
</div>

<!-- MAIN -->
<div id="main">

<div id="top">
👑 RAMY METAVERSE ASCENSION SYSTEM 🛰️💀
</div>

<div id="content">

<!-- ROOMS -->
<div id="rooms">
<button class="roomBtn" onclick="switchRoom('main')">MAIN CORE</button>
<button class="roomBtn" onclick="switchRoom('cyber')">CYBER ROOM</button>
<button class="roomBtn" onclick="switchRoom('dark')">DARK NODE</button>
<button class="roomBtn" onclick="switchRoom('xat')">XAT ROOM</button>
</div>

<!-- CHAT AREA -->
<div id="chatBox">

<h3 id="title">ROOM: MAIN CORE</h3>

<div id="chat"></div>

<input class="msg" id="msg">
<button onclick="send()">SEND</button>

</div>

</div>
</div>

<script>

let currentRoom="main";

let rooms={
main:[],
cyber:[],
dark:[]
};

// 🔐 unlock
function unlock(){
if(document.getElementById("pass").value==="111991"){
document.getElementById("login").style.display="none";
document.getElementById("main").style.display="block";
}else{
alert("❌ WRONG CODE");
}
}

// 🌐 switch rooms
function switchRoom(r){

currentRoom=r;

document.getElementById("title").innerText="ROOM: "+r.toUpperCase();

let chat=document.getElementById("chat");

chat.innerHTML="";

if(r==="xat"){
chat.innerHTML=`
<iframe src="https://xat.com/2ra"
style="width:100%;height:400px;border:none;"></iframe>
`;
return;
}

render();
}

// 💬 render chat
function render(){
let chat=document.getElementById("chat");
chat.innerHTML="";

rooms[currentRoom].forEach(m=>{
chat.innerHTML+=m+"<br>";
});
}

// 🧠 fake AI
function ai(msg){
msg=msg.toLowerCase();

if(msg.includes("ramy"))
return "👑 RAMY IS THE CORE ENTITY";

if(currentRoom==="dark")
return "☠ DARK NODE ACTIVE";

return "SYSTEM RESPONSE OK";
}

// 📩 send
function send(){
let msg=document.getElementById("msg").value;

if(currentRoom==="xat"){
alert("Use XAT room directly");
return;
}

rooms[currentRoom].push("YOU: "+msg);
rooms[currentRoom].push("AI: "+ai(msg));

document.getElementById("msg").value="";
render();
}

</script>

</body>
</html>
