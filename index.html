<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ramy · Cyber Profile</title>

<style>
@import url('https://fonts.googleapis.com/css?family=Lora:400,700');

body {
    margin:0;
    font-family:Lora, serif;
    color:white;
    overflow:hidden;
}

/* ===== BACKGROUND ANIMATION ===== */
.background {
    position:fixed;
    width:100%;
    height:100%;
    background:url('https://xatimg.com/image/AeKGBMT8u33T.jpg') center/cover;
    filter:brightness(0.3) contrast(1.2);
    animation: zoom 20s infinite alternate;
}

@keyframes zoom {
    from { transform: scale(1); }
    to { transform: scale(1.2); }
}

/* MATRIX OVERLAY */
.matrix {
    position:fixed;
    width:100%;
    height:100%;
    background: repeating-linear-gradient(
        0deg,
        rgba(0,255,120,0.05),
        rgba(0,255,120,0.05) 1px,
        transparent 1px,
        transparent 3px
    );
    animation: move 8s linear infinite;
}

@keyframes move {
    from { background-position:0 0; }
    to { background-position:0 100px; }
}

/* PASSWORD SCREEN */
#lock {
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.9);
    backdrop-filter: blur(10px);
}

.lock-box {
    text-align:center;
    padding:30px;
    border:1px solid #0ff;
    box-shadow:0 0 20px #0ff;
    border-radius:10px;
}

input {
    padding:10px;
    border:none;
    outline:none;
    margin-top:10px;
    width:200px;
    text-align:center;
    font-size:18px;
}

button {
    margin-top:10px;
    padding:10px 20px;
    background:#0ff;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

/* PROFILE */
#content {
    display:none;
    text-align:center;
    position:relative;
    padding-top:60px;
}

.glow {
    text-shadow:0 0 10px #0ff,0 0 20px #0ff;
}

.info {
    margin:10px;
    letter-spacing:2px;
    line-height:2;
}

/* VIDEO SECTION */
.videos {
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:15px;
    margin-top:20px;
}

iframe {
    width:220px;
    height:140px;
    border-radius:10px;
    border:1px solid #0ff;
}

/* MUSIC BUTTON */
#musicBtn {
    position:fixed;
    bottom:20px;
    right:20px;
    padding:12px 20px;
    background:#0ff;
    border:none;
    cursor:pointer;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="background"></div>
<div class="matrix"></div>

<!-- PASSWORD -->
<div id="lock">
    <div class="lock-box">
        <h2>ENTER ACCESS CODE</h2>
        <input type="password" id="pass" placeholder="••••••••">
        <br>
        <button onclick="check()">UNLOCK</button>
    </div>
</div>

<!-- CONTENT -->
<div id="content">

    <h1 class="glow">RAMY PROFILE</h1>

    <div class="info">
        Name: RAMY<br>
        Age: 35<br>
        Status: ONLINE 🟢<br>
        System: CYBER EDITION VIP
    </div>

    <!-- VIDEOS (OLD STYLE RESTORED) -->
    <div class="videos">
        <iframe src="https://www.youtube.com/embed/4ulSR860HyU"></iframe>
        <iframe src="https://www.youtube.com/embed/b-KFYv7cuxk"></iframe>
        <iframe src="https://www.youtube.com/embed/OoyK4I3DyJ0"></iframe>
    </div>

</div>

<!-- MUSIC -->
<audio id="music" loop>
    <source src="https://files.catbox.moe/7p7k9y.mp3" type="audio/mp3">
</audio>

<button id="musicBtn" onclick="toggleMusic()">▶ PLAY MUSIC</button>

<script>
function check(){
    let p = document.getElementById("pass").value;
    if(p === "111991"){
        document.getElementById("lock").style.display="none";
        document.getElementById("content").style.display="block";
    } else {
        alert("WRONG PASSWORD");
    }
}

let music = document.getElementById("music");
let btn = document.getElementById("musicBtn");

function toggleMusic(){
    if(music.paused){
        music.play();
        btn.innerText="⏸ PAUSE MUSIC";
    } else {
        music.pause();
        btn.innerText="▶ PLAY MUSIC";
    }
}
</script>

</body>
</html>
