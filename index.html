<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>3D METAVERSE WORLD - RAMY</title>
<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
#ui {
position:fixed;
top:10px;left:10px;
color:#00ffe5;
z-index:10;
}
#login{
position:fixed;
width:100%;height:100%;
display:flex;
justify-content:center;
align-items:center;
background:black;
z-index:20;
}
.box{
padding:20px;
border:1px solid cyan;
box-shadow:0 0 30px cyan;
text-align:center;
}
input{
padding:10px;
background:black;
border:1px solid cyan;
color:cyan;
}
button{
margin-top:10px;
padding:10px;
background:black;
border:1px solid cyan;
color:cyan;
cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="box">
<h2>🛰️ ENTER METAVERSE</h2>
<input type="password" id="pass">
<br>
<button onclick="start()">ENTER</button>
</div>
</div>

<div id="ui">
👑 RAMY METAVERSE 3D WORLD<br>
MOVE: WASD | LOOK: MOUSE
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.min.js"></script>

<script>

// LOGIN
function start(){
if(document.getElementById("pass").value !== "111991"){
alert("ACCESS DENIED");
return;
}
document.getElementById("login").style.display="none";
init();
}

// 3D WORLD
let scene, camera, renderer;
let move = {w:false,a:false,s:false,d:false};

function init(){

scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 10, 50);

camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.z = 5;

renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
let light = new THREE.PointLight(0x00ffff,1);
light.position.set(5,5,5);
scene.add(light);

// FLOOR
let floorGeo = new THREE.PlaneGeometry(100,100);
let floorMat = new THREE.MeshBasicMaterial({color:0x001a1a,wireframe:true});
let floor = new THREE.Mesh(floorGeo,floorMat);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// CYBER CUBES
for(let i=0;i<30;i++){
let geo = new THREE.BoxGeometry(1,1,1);
let mat = new THREE.MeshBasicMaterial({color:0x00ffff,wireframe:true});
let cube = new THREE.Mesh(geo,mat);

cube.position.x = (Math.random()-0.5)*30;
cube.position.y = 1;
cube.position.z = (Math.random()-0.5)*30;

scene.add(cube);
}

// PORTAL (XAT)
let portalGeo = new THREE.TorusGeometry(2,0.3,16,100);
let portalMat = new THREE.MeshBasicMaterial({color:0xff00ff,wireframe:true});
let portal = new THREE.Mesh(portalGeo,portalMat);
portal.position.set(0,2,-10);
portal.name="portal";
scene.add(portal);

// CONTROLS
document.addEventListener("keydown",(e)=>{
if(e.key==="w")move.w=true;
if(e.key==="a")move.a=true;
if(e.key==="s")move.s=true;
if(e.key==="d")move.d=true;
if(e.key==="Enter")checkPortal();
});

document.addEventListener("keyup",(e)=>{
if(e.key==="w")move.w=false;
if(e.key==="a")move.a=false;
if(e.key==="s")move.s=false;
if(e.key==="d")move.d=false;
});

animate();
}

// MOVE
function animate(){
requestAnimationFrame(animate);

if(move.w)camera.position.z -= 0.1;
if(move.s)camera.position.z += 0.1;
if(move.a)camera.position.x -= 0.1;
if(move.d)camera.position.x += 0.1;

renderer.render(scene,camera);
}

// PORTAL ACTION
function checkPortal(){
if(camera.position.distanceTo(new THREE.Vector3(0,2,-10))<5){
window.open("https://xat.com/2ra","_blank");
}
}

</script>

</body>
</html>
