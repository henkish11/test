<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ramy · DARK ACCESS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    overflow:hidden;
    font-family: monospace;
    background:black;
    color:#00ffe1;
}

/* ===== MATRIX CANVAS ===== */
canvas {
    position:fixed;
    top:0;
    left:0;
    z-index:0;
}

/* ===== LOGIN ===== */
#login {
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:10;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
}

.box {
    padding:30px;
    border:1px solid #00ffe1;
    box-shadow:0 0 25px #00ffe1;
    text-align:center;
}

input {
    margin-top:10px;
    padding:10px;
    background:black;
    border:1px solid #00ffe1;
    color:#00ffe1;
    text-align:center;
    letter-spacing:4px;
}

button {
    margin-top:15px;
    padding:10px;
    width:100%;
    background:#00ffe1;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

/* ===== LOADING ===== */
#loading {
    position:fixed;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:black;
    z-index:20;
}

.bar {
    width:300px;
    height:10px;
    border:1px solid #00ffe1;
    margin-top:20px;
}

.fill {
    height:100%;
    width:0%;
    background:#00ffe1;
}

/* ===== MAIN ===== */
#main {
    display:none;
    position:relative;
    z-index:5;
    text-align:center;
    padding-top:80px;
}

h1 {
    letter-spacing:5px;
}

.glow {
    text-shadow:0 0 10px #00ffe1;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- LOGIN -->
<div id="login">
    <div class="box">
        <h2 class="glow">DARK ACCESS</h2>
        <input id="pass" type="password" placeholder="ENTER CODE">
        <button onclick="startHack()">ENTER</button>
    </div>
</div>

<!-- LOADING -->
<div id="loading">
    <h2 class="glow">HACK SYSTEM LOADING...</h2>
    <div class="bar"><div class="fill" id="fill"></div></div>
</div>

<!-- MAIN -->
<div id="main">
    <h1 class="glow">WELCOME RAMY</h1>
    <p>STATUS: ONLINE • LEVEL: VIP • AGE: 35</p>
    <p>SYSTEM: DARK NET INTERFACE ACTIVE</p>
</div>

<!-- SOUND -->
<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-29.mp3"></audio>

<script>

/* ===== MATRIX ===== */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let letters = "01HACKSYSTEMRAMYVIP###$$$@@@";
letters = letters.split("");

let fontSize = 14;
let columns = canvas.width / fontSize;
let drops = [];

for(let x=0;x<columns;x++) drops[x]=1;

function drawMatrix(){
    ctx.fillStyle="rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#00ffe1";
    ctx.font=fontSize+"px monospace";

    for(let i=0;i<drops.length;i++){
        let text = letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text,i*fontSize,drops[i]*fontSize);

        if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
            drops[i]=0;
        }
        drops[i]++;
    }
}
setInterval(drawMatrix,33);

/* ===== HACK SEQUENCE ===== */
function startHack(){
    let pass = document.getElementById("pass").value;
    if(pass !== "111991"){
        alert("ACCESS DENIED");
        return;
    }

    document.getElementById("sound").play();

    document.getElementById("login").style.display="none";
    document.getElementById("loading").style.display="flex";

    let fill = document.getElementById("fill");
    let p = 0;

    let t = setInterval(()=>{
        p++;
        fill.style.width = p+"%";

        if(p>=100){
            clearInterval(t);
            document.getElementById("loading").style.display="none";
            document.getElementById("main").style.display="block";
        }
    },30);
}
</script>

</body>
</html>
