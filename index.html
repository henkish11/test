<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FULL IMMERSIVE METAVERSE VR</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#hud{
position:fixed;
top:10px;
left:10px;
color:#00ffe5;
z-index:10;
font-size:14px;
text-shadow:0 0 10px cyan;
}

#crosshair{
position:fixed;
top:50%;
left:50%;
width:10px;
height:10px;
background:#00ffe5;
transform:translate(-50%,-50%);
border-radius:50%;
z-index:10;
box-shadow:0 0 10px cyan;
}

/* LOGIN */
#login{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:black;
z-index:100;
}

.box{
padding:25px;
border:1px solid cyan;
box-shadow:0 0 40px cyan;
text-align:center;
}

input{
padding:10px;
background:black;
border:1px solid cyan;
color:cyan;
}

button{
padding:10px;
background:black;
border:1px solid cyan;
color:cyan;
cursor:pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="box">
<h2>🧠 VR METAVERSE ACCESS</h2>
<input type="password" id="pass">
<br><br>
<button onclick="start()">ENTER WORLD</button>
</div>
</div>

<div id="hud">
👑 RAMY METAVERSE VR<br>
MOVE: WASD | LOOK: MOUSE | PORTAL: E
</div>

<div id="crosshair"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.min.js"></script>

<script>

let scene,camera,renderer;
let move={w:false,a:false,s:false,d:false};
let portal;

function start(){
if(document.getElementById("pass").value!=="111991"){
alert("ACCESS DENIED");
return;
}
document.getElementById("login").style.display="none";
init();
}

function init(){

scene=new THREE.Scene();
scene.fog=new THREE.Fog(0x000000,5,60);

camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,2,5);

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
let light=new THREE.PointLight(0x00ffff,2);
light.position.set(10,10,10);
scene.add(light);

// FLOOR
let floor=new THREE.Mesh(
new THREE.PlaneGeometry(200,200),
new THREE.MeshBasicMaterial({color:0x001111,wireframe:true})
);
floor.rotation.x=-Math.PI/2;
scene.add(floor);

// CYBER OBJECTS
for(let i=0;i<50;i++){
let box=new THREE.Mesh(
new THREE.BoxGeometry(1,1,1),
new THREE.MeshBasicMaterial({color:0x00ffff,wireframe:true})
);

box.position.set(
(Math.random()-0.5)*50,
1,
(Math.random()-0.5)*50
);

scene.add(box);
}

// PORTAL
portal=new THREE.Mesh(
new THREE.TorusGeometry(2,0.3,16,100),
new THREE.MeshBasicMaterial({color:0xff00ff,wireframe:true})
);

portal.position.set(0,2,-20);
scene.add(portal);

// CONTROLS
document.addEventListener("keydown",(e)=>{
if(e.key==="w")move.w=true;
if(e.key==="a")move.a=true;
if(e.key==="s")move.s=true;
if(e.key==="d")move.d=true;
if(e.key==="e")enterPortal();
});

document.addEventListener("keyup",(e)=>{
if(e.key==="w")move.w=false;
if(e.key==="a")move.a=false;
if(e.key==="s")move.s=false;
if(e.key==="d")move.d=false;
});

animate();
}

// MOVE SYSTEM
function animate(){

requestAnimationFrame(animate);

if(move.w)camera.position.z-=0.15;
if(move.s)camera.position.z+=0.15;
if(move.a)camera.position.x-=0.15;
if(move.d)camera.position.x+=0.15;

// portal glow animation
portal.rotation.x+=0.01;
portal.rotation.y+=0.02;

renderer.render(scene,camera);
}

// PORTAL ACTION
function enterPortal(){
let dist=camera.position.distanceTo(portal.position);

if(dist<5){
window.open("https://xat.com/2ra","_blank");
}
}

</script>

</body>
</html>
