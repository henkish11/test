<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>بوابة الزمن</title>
<style>
*{box-sizing:border-box}body,html{margin:0;height:100%;overflow:hidden;font-family:Tahoma;background:#000;color:#fff}body{display:flex;align-items:center;justify-content:center}.bg{position:fixed;inset:0;background:radial-gradient(circle at center,#112,#000 60%);} .stars,.stars:after{content:'';position:absolute;inset:-50%;background-image:radial-gradient(#fff 1px,transparent 1px);background-size:40px 40px;animation:spin 80s linear infinite;opacity:.35}.stars:after{transform:scale(1.5);animation-direction:reverse;opacity:.2}.panel{position:relative;z-index:2;text-align:center;padding:30px 40px;background:rgba(0,0,0,.35);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.15);border-radius:28px;box-shadow:0 0 40px rgba(0,180,255,.25)}.portal{width:220px;height:220px;border-radius:50%;margin:0 auto 20px;position:relative;background:conic-gradient(#0ff,#40f,#0ff);animation:spin 6s linear infinite;box-shadow:0 0 40px #0ff}.portal:before{content:'';position:absolute;inset:18px;border-radius:50%;background:#000}.portal:after{content:'';position:absolute;inset:55px;border-radius:50%;background:radial-gradient(circle,#0ff,#103,#000)}input{padding:14px 18px;border:none;border-radius:14px;width:260px;font-size:18px;text-align:center}button{margin-top:12px;padding:12px 24px;border:none;border-radius:14px;background:#0ff;color:#000;font-weight:bold;cursor:pointer}h1{margin:0 0 10px;font-size:34px}.hidden{display:none}.inside{position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;background:radial-gradient(circle,#120024,#000)}.name{font-size:64px;font-weight:bold;text-shadow:0 0 15px #fff,0 0 35px #0ff,0 0 55px #f0f;animation:pulse 2s infinite}.clock{margin-top:20px;font-size:24px;letter-spacing:2px}.particles span{position:absolute;width:4px;height:4px;background:#fff;border-radius:50%;animation:float 8s linear infinite}.error{animation:shake .35s} @keyframes spin{to{transform:rotate(360deg)}}@keyframes pulse{50%{transform:scale(1.06)}}@keyframes float{from{transform:translateY(100vh) scale(0)}to{transform:translateY(-10vh) scale(1)}}@keyframes shake{25%{transform:translateX(-8px)}50%{transform:translateX(8px)}75%{transform:translateX(-8px)}}
</style>
</head>
<body>
<div class='bg'><div class='stars'></div></div>
<div class='panel' id='login'>
<div class='portal'></div>
<h1>بوابة الزمن</h1>
<input id='pass' type='password' placeholder='اكتب الشفرة الزمنية'>
<br><button onclick='enterPortal()'>دخول</button>
</div>
<div class='inside' id='inside'>
<div style='position:absolute;inset:0;background:radial-gradient(circle at top,#1a0033,#000);opacity:.9'></div>
<div class='particles' id='particles'></div>
<img src='https://xatimg.com/image/dx5xk8bPns9a.jpg' style='width:180px;height:180px;object-fit:cover;border-radius:50%;border:3px solid #fff;box-shadow:0 0 30px #0ff;z-index:2'>
<div class='name' style='z-index:2'>RAMY</div>
<div style='z-index:2;margin-top:18px;font-size:22px;text-align:center;max-width:700px;line-height:1.8'>Age: 35 years old • From Egypt 🇪🇬<br>Bio: I love everyone and I hate lying.</div>
<div class='clock' id='clock'></div>
</div>
<script>
const code='1234';
function enterPortal(){const p=document.getElementById('pass');if(p.value===code){document.getElementById('login').style.display='none';document.getElementById('inside').style.display='flex';spawn();tick();}else{p.classList.add('error');setTimeout(()=>p.classList.remove('error'),400);p.value='';p.placeholder='شفرة خاطئة';}}
function tick(){setInterval(()=>{clock.textContent=new Date().toLocaleTimeString('ar-EG')},1000)}
function spawn(){for(let i=0;i<80;i++){let s=document.createElement('span');s.style.left=Math.random()*100+'%';s.style.animationDelay=Math.random()*8+'s';s.style.opacity=Math.random();particles.appendChild(s)}}
document.addEventListener('mousemove',e=>{const x=(e.clientX/window.innerWidth-.5)*20;const y=(e.clientY/window.innerHeight-.5)*20;document.querySelector('.name').style.transform=`translate(${x}px,${y}px)`;});setInterval(()=>{document.body.style.filter=`hue-rotate(${Math.random()*360}deg)`},4000);
// English clock
function startClock(){
const c=document.createElement('div');
c.id='clock';
c.style.marginTop='15px';
c.style.fontSize='20px';
c.style.letterSpacing='2px';
document.querySelector('.inside').appendChild(c);
setInterval(()=>{
c.textContent=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true});
},1000);
}

function enter(){
document.getElementById('login').style.display='none';
document.getElementById('inside').style.display='flex';

for(let i=0;i<60;i++){
let s=document.createElement('div');
s.className='p';
s.style.left=Math.random()*100+'%';
s.style.animationDuration=(2+Math.random()*5)+'
<audio id='radio' autoplay controls style='position:fixed;bottom:20px;right:20px;z-index:99;width:200px'>
<source src='https://stream.radiojar.com/8s5u5tpdtwzuv' type='audio/mpeg'>
</audio>
<script>
// محاولة تشغيل تلقائي مع تفاعل المستخدم
window.addEventListener('click',()=>{
const r=document.getElementById('radio');
if(r) r.play().catch(()=>{});
},{once:true});
</script>
<!-- Hidden Quran Audio -->
<audio id='quran' autoplay loop style='display:none'>
<source src='https://server13.mp3quran.net/husr/001.mp3' type='audio/mpeg'>
</audio>
<script>
window.addEventListener('click',()=>{
const q=document.getElementById('quran');
if(q) q.play().catch(()=>{});
},{once:true});
</script>
</body></html>
