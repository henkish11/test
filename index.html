<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REALITY WORLD - RAMY</title>

<style>
body{
margin:0;
font-family:Arial;
background:black;
color:#00ffe5;
overflow:hidden;
}

/* LOGIN */
#login{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

.box{
border:1px solid cyan;
padding:30px;
box-shadow:0 0 30px cyan;
text-align:center;
}

input{
padding:10px;
background:black;
border:1px solid cyan;
color:cyan;
}

/* MAIN */
#main{
display:none;
padding:10px;
}

/* HEADER */
#header{
border-bottom:1px solid cyan;
padding:10px;
}

/* ROOMS */
button{
background:black;
color:cyan;
border:1px solid cyan;
padding:10px;
cursor:pointer;
margin:3px;
}

/* CHAT */
#chat{
height:250px;
overflow:auto;
border:1px solid cyan;
padding:10px;
margin-top:10px;
}

/* INPUT */
#msg{
width:70%;
padding:10px;
background:black;
color:cyan;
border:1px solid cyan;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="box">
<h2>🔐 ENTER ACCESS CODE</h2>
<input type="password" id="pass">
<br><br>
<button onclick="unlock()">ENTER</button>
</div>
</div>

<!-- MAIN -->
<div id="main">

<div id="header">
<h2>👑 RAMY REALITY WORLD</h2>
<div>
NAME: RAMY<br>
AGE: 35<br>
STATUS: ONLINE 🟢<br>
MODE: ACTIVE USER
</div>
</div>

<!-- ROOMS -->
<div>
<button onclick="switchRoom('main')">🟢 MAIN</button>
<button onclick="switchRoom('lab')">🔵 LAB</button>
<button onclick="switchRoom('dark')">🔴 DARK</button>
</div>

<h3 id="roomTitle">ROOM: MAIN</h3>

<div id="chat"></div>

<input id="msg">
<button onclick="send()">SEND</button>

</div>

<script>

let currentRoom="main";

let rooms={
main:[],
lab:[],
dark:[]
};

// فتح النظام
function unlock(){
let p=document.getElementById("pass").value;

if(p==="111991"){
document.getElementById("login").style.display="none";
document.getElementById("main").style.display="block";
}else{
alert("❌ WRONG PASSWORD");
}
}

// تغيير غرفة
function switchRoom(r){
currentRoom=r;
document.getElementById("roomTitle").innerText="ROOM: "+r.toUpperCase();
render();
}

// عرض الرسائل
function render(){
let chat=document.getElementById("chat");
chat.innerHTML="";

rooms[currentRoom].forEach(m=>{
chat.innerHTML+=m+"<br>";
});
}

// رد AI بسيط
function ai(msg){
msg=msg.toLowerCase();

if(msg.includes("ramy"))
return "👑 RAMY IS THE CORE USER";

if(currentRoom==="dark")
return "☠ DARK ROOM ACTIVE";

if(currentRoom==="lab")
return "🧪 LAB PROCESS DONE";

return "AI RESPONSE GENERATED";
}

// إرسال
function send(){
let msg=document.getElementById("msg").value;

rooms[currentRoom].push("YOU: "+msg);
rooms[currentRoom].push("AI: "+ai(msg));

document.getElementById("msg").value="";
render();
}

</script>

</body>
</html>
