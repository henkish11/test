<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Profile</title>

<style>
@import url("https://fonts.googleapis.com/css?family=Lora:400,700");

body {
    margin: 0;
    font-family: Lora, serif;
    overflow: hidden;
}

/* ===== Animated Background ===== */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://xatimg.com/image/AeKGBMT8u33T.jpg') center/cover no-repeat;
    filter: brightness(0.4) contrast(1.2);
    animation: zoom 20s infinite alternate;
}

@keyframes zoom {
    from { transform: scale(1); }
    to { transform: scale(1.2); }
}

/* ===== Login Overlay ===== */
#login {
    position: fixed;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(10px);
    z-index: 999;
}

.login-box {
    background: rgba(0,0,0,0.6);
    border: 1px solid #00fff2;
    box-shadow: 0 0 25px #00fff2;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    width: 300px;
}

.login-box h2 {
    color: #00fff2;
    margin-bottom: 15px;
    letter-spacing: 2px;
}

.login-box input {
    width: 90%;
    padding: 10px;
    border: none;
    outline: none;
    margin-top: 10px;
    border-radius: 8px;
    text-align: center;
    font-size: 16px;
}

.login-box button {
    margin-top: 15px;
    width: 100%;
    padding: 10px;
    border: none;
    cursor: pointer;
    background: #00fff2;
    color: black;
    font-weight: bold;
    border-radius: 8px;
    transition: 0.3s;
}

.login-box button:hover {
    background: #00c2b8;
}

/* ===== Main Content ===== */
#content {
    display: none;
    position: relative;
    color: white;
    text-align: center;
    padding-top: 80px;
}

.glowIn span {
    display: inline-block;
    opacity: 0;
    animation: glow 0.8s forwards;
}

@keyframes glow {
    from { opacity: 0; transform: translateY(10px); }
    60% { opacity: 1; text-shadow: 0 0 20px #00fff2; }
    to { opacity: 1; }
}

.videos {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 30px;
}

iframe {
    width: 200px;
    height: 140px;
    border-radius: 10px;
    border: 1px solid #00fff2;
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- ===== LOGIN ===== -->
<div id="login">
    <div class="login-box">
        <h2>VIP ACCESS</h2>
        <input type="password" id="pass" placeholder="Enter Password">
        <button onclick="checkPass()">Unlock</button>
        <p id="msg" style="color:red;"></p>
    </div>
</div>

<!-- ===== CONTENT ===== -->
<div id="content">

    <h1 class="glowIn">Welcome Ramy</h1>
    <p class="glowIn">VIP Hacker Profile Activated</p>

    <div class="videos">
        <iframe src="https://www.youtube.com/embed/4ulSR860HyU"></iframe>
        <iframe src="https://www.youtube.com/embed/b-KFYv7cuxk"></iframe>
    </div>
</div>

<script>
const correctPass = "111991";

function checkPass() {
    let input = document.getElementById("pass").value;
    if(input === correctPass){
        document.getElementById("login").style.display = "none";
        document.getElementById("content").style.display = "block";
        animateText();
    } else {
        document.getElementById("msg").innerText = "Wrong Password!";
    }
}

function animateText(){
    document.querySelectorAll(".glowIn").forEach(el=>{
        let letters = el.textContent.split("");
        el.textContent = "";
        letters.forEach((l,i)=>{
            let span = document.createElement("span");
            span.textContent = l;
            span.style.animationDelay = (i*0.05)+"s";
            el.appendChild(span);
        });
    });
}
</script>

</body>
</html>
