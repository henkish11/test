<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NEXT EVOLUTION WORLD</title>

<style>
body{
margin:0;
background:black;
color:#00ffe5;
font-family:Arial;
}

#login{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

.box{
padding:30px;
border:1px solid cyan;
box-shadow:0 0 30px cyan;
text-align:center;
}

input{
padding:10px;
background:black;
border:1px solid cyan;
color:cyan;
margin:5px;
}

button{
background:black;
color:cyan;
border:1px solid cyan;
padding:10px;
cursor:pointer;
margin:5px;
}

/* MAIN */
#main{
display:none;
padding:10px;
}

#chat{
height:200px;
overflow:auto;
border:1px solid cyan;
padding:10px;
margin-top:10px;
}

/* USER PANEL */
#userBox{
border:1px solid cyan;
padding:10px;
margin-top:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="box">
<h2>🔐 ACCESS</h2>
<input type="password" id="pass">
<br>
<button onclick="unlock()">ENTER</button>
</div>
</div>

<!-- MAIN -->
<div id="main">

<h2>🌐 NEXT EVOLUTION WORLD</h2>

<!-- ROOMS -->
<button onclick="switchRoom('main')">MAIN</button>
<button onclick="switchRoom('lab')">LAB</button>
<button onclick="switchRoom('dark')">DARK</button>

<h3 id="roomTitle">ROOM: MAIN</h3>

<!-- CHAT -->
<div id="chat"></div>

<input id="msg">
<button onclick="send()">SEND</button>

<hr>

<!-- USER ID LOOKUP -->
<h3>👤 USER ID LOOKUP</h3>
<input id="uid" placeholder="Enter User ID">
<button onclick="getUser()">SEARCH</button>

<div id="userBox">NO USER LOADED</div>

</div>

<script>

let currentRoom="main";

let rooms={
main:[],
lab:[],
dark:[]
};

// 👤 Fake users database (داخل النظام فقط)
let users={
"1001":{name:"RAMY",age:35,status:"ONLINE 🟢",room:"MAIN"},
"1002":{name:"ALI",age:22,status:"OFFLINE ⚫",room:"LAB"},
"1003":{name:"DARK-X",age:99,status:"UNKNOWN ☠",room:"DARK"}
};

// 🔐 login
function unlock(){
if(document.getElementById("pass").value==="111991"){
document.getElementById("login").style.display="none";
document.getElementById("main").style.display="block";
}else{
alert("❌ WRONG PASSWORD");
}
}

// 🌐 rooms
function switchRoom(r){
currentRoom=r;
document.getElementById("roomTitle").innerText="ROOM: "+r.toUpperCase();
render();
}

// 💬 chat
function render(){
let chat=document.getElementById("chat");
chat.innerHTML="";
rooms[currentRoom].forEach(m=>{
chat.innerHTML+=m+"<br>";
});
}

// 🧠 AI simple
function ai(msg){
msg=msg.toLowerCase();

if(msg.includes("ramy")) return "👑 CORE USER DETECTED";
if(currentRoom==="dark") return "☠ DARK SIGNAL ACTIVE";
if(currentRoom==="lab") return "🧪 LAB PROCESS RUNNING";

return "AI RESPONSE OK";
}

// 📩 send message
function send(){
let msg=document.getElementById("msg").value;

rooms[currentRoom].push("YOU: "+msg);
rooms[currentRoom].push("AI: "+ai(msg));

document.getElementById("msg").value="";
render();
}

// 👤 USER ID SEARCH
function getUser(){
let id=document.getElementById("uid").value;

let u=users[id];

let box=document.getElementById("userBox");

if(u){
box.innerHTML=`
NAME: ${u.name}<br>
AGE: ${u.age}<br>
STATUS: ${u.status}<br>
ROOM: ${u.room}
`;
}else{
box.innerHTML="❌ USER NOT FOUND";
}
}

</script>

</body>
</html>
