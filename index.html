<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BEYOND OMNIVERSE</title>

<style>
body {
    margin:0;
    overflow:hidden;
    font-family: Arial, sans-serif;
}

/* ===== MATRIX BACKGROUND ===== */
canvas {
    position: fixed;
    top:0;
    left:0;
    z-index:-1;
    background:black;
}

/* ===== PASSWORD SCREEN ===== */
#lockScreen {
    position: fixed;
    width:100%;
    height:100%;
    background: radial-gradient(circle, #0a0a0a, black);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
    z-index:9999;
}

#lockBox {
    padding:20px;
    border:1px solid #00ffcc;
    border-radius:10px;
    box-shadow:0 0 20px #00ffcc;
    text-align:center;
}

input {
    padding:10px;
    margin-top:10px;
    background:black;
    border:1px solid #00ffcc;
    color:#00ffcc;
    text-align:center;
}

button {
    margin-top:10px;
    padding:10px 20px;
    background:#00ffcc;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

/* ===== MAIN CONTENT ===== */
#main {
    display:none;
    color:white;
    text-align:center;
    padding-top:40px;
}

.glow {
    text-shadow:0 0 10px #00ffcc,0 0 20px #00ffcc;
}

/* videos */
.videos iframe{
    width:220px;
    height:140px;
    margin:10px;
    border-radius:10px;
    border:1px solid #00ffcc;
}

/* music button */
#musicBtn{
    padding:10px 15px;
    margin-top:20px;
    background:#111;
    color:#00ffcc;
    border:1px solid #00ffcc;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- MATRIX -->
<canvas id="matrix"></canvas>

<!-- PASSWORD -->
<div id="lockScreen">
    <div id="lockBox">
        <h2>🔐 SYSTEM LOCKED</h2>
        <p>Enter Access Code</p>
        <input type="password" id="pass">
        <br>
        <button onclick="checkPass()">ENTER</button>
    </div>
</div>

<!-- MAIN -->
<div id="main">
    <h1 class="glow">BEYOND OMNIVERSE 😈💀</h1>
    <h2 class="glow">USER: RAMY</h2>
    <p class="glow">CYBER CINEMATIC PROFILE ACTIVE</p>

    <button id="musicBtn" onclick="playMusic()">▶ PLAY MUSIC</button>

    <div class="videos">
        <iframe src="https://www.youtube.com/embed/4ulSR860HyU"></iframe>
        <iframe src="https://www.youtube.com/embed/b-KFYv7cuxk"></iframe>
        <iframe src="https://www.youtube.com/embed/OoyK4I3DyJ0"></iframe>
    </div>
</div>

<!-- AUDIO -->
<audio id="audio" loop>
    <source src="https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/Komiku/Action_Story/Komiku_-_10_-_Battle_of_Pogs.mp3">
</audio>

<script>

/* ===== PASSWORD ===== */
function checkPass(){
    let p = document.getElementById("pass").value;
    if(p === "111991"){
        document.getElementById("lockScreen").style.display="none";
        document.getElementById("main").style.display="block";
    } else {
        alert("WRONG CODE");
    }
}

/* ===== MUSIC ===== */
function playMusic(){
    document.getElementById("audio").play();
}

/* ===== MATRIX ===== */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01RAMYBEYONDOMNIVERSE";
letters = letters.split("");

let fontSize = 14;
let columns = canvas.width / fontSize;

let drops = [];

for(let x=0;x<columns;x++)
    drops[x]=1;

function draw(){
    ctx.fillStyle="rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#00ffcc";
    ctx.font=fontSize+"px monospace";

    for(let i=0;i<drops.length;i++){
        let text = letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text,i*fontSize,drops[i]*fontSize);

        if(drops[i]*fontSize > canvas.height && Math.random()>0.975)
            drops[i]=0;

        drops[i]++;
    }
}
setInterval(draw,33);
</script>

</body>
</html>
